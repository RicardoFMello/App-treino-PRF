<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zeus — Preparação PRF</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0B1D3A">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="tela-auth">
    <div class="card-auth">
      <div class="marca">
        <span class="raio">⚡</span>
        <h1>ZEUS</h1>
      </div>
      <p class="subtitulo">Preparação física — TAF PRF</p>

      <h2 id="titulo-form">Entrar</h2>
      <form id="form-auth">
        <label for="email">E-mail</label>
        <input type="email" id="email" required autocomplete="email">

        <label for="senha">Senha</label>
        <input type="password" id="senha" required minlength="6" autocomplete="current-password">

        <p id="mensagem" class="mensagem"></p>

        <button type="submit" id="btn-submit" class="btn-primario">Entrar</button>
      </form>
      <button id="btn-alternar" class="btn-texto">Criar nova conta</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
